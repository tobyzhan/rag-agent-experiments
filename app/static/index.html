<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RAG Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --text: #ececec;
      --muted: #8e8ea0;
      --bubble: #2f2f2f;
      --input-bg: #2a2a2a;
      --border: #333;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Inter", -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      font-weight: 600;
      font-size: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
    }
    .msg {
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .user {
      align-self: flex-end;
      background: var(--bubble);
      border-radius: 18px;
      padding: 10px 16px;
      max-width: 70%;
    }
    .bot { align-self: flex-start; max-width: 100%; }
    #composer {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding: 12px 16px 28px;
      flex-shrink: 0;
    }
    #row {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 6px 6px 6px 20px;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 10px 0;
    }
    #input:focus { outline: none; }
    #input::placeholder { color: var(--muted); }
    #send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #fff;
      color: #000;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #send:hover { background: #d9d9d9; }
    #send:disabled { background: #555; cursor: default; }
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      margin-right: 4px;
      background: var(--muted);
      border-radius: 50%;
      animation: blink 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: .2; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <header>RAG Chatbot</header>
  <div id="log"></div>
  <div id="composer">
    <div id="row">
      <input id="input" placeholder="Ask something..." autocomplete="off" />
      <button id="send" onclick="send()">&uarr;</button>
    </div>
  </div>

  <script>
    let sessionId = localStorage.getItem("session_id");
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem("session_id", sessionId);
    }

    const log = document.getElementById("log");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function append(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "msg bot typing-dots";
      div.innerHTML = "<span></span><span></span><span></span>";
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    function typeOnto(div, text) {
      const totalFrames = 40;
      const chunkSize = Math.max(1, Math.ceil(text.length / totalFrames));
      let i = 0;
      div.textContent = "";
      const interval = setInterval(() => {
        i += chunkSize;
        div.textContent = text.slice(0, i);
        log.scrollTop = log.scrollHeight;
        if (i >= text.length) clearInterval(interval);
      }, 20);
    }

    async function send() {
      const message = input.value.trim();
      if (!message) return;
      append(message, "user");
      input.value = "";
      sendBtn.disabled = true;

      const typingDiv = showTyping();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message }),
        });
        const data = await res.json();
        typingDiv.className = "msg bot";
        typeOnto(typingDiv, data.response);
      } finally {
        sendBtn.disabled = false;
      }
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
    });
  </script>
</body>
</html>
