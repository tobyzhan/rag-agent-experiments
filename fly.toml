# fly.toml app configuration file generated for ragagent on 2026-07-15T00:31:45-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ragagent'
primary_region = 'iad'

[build]
[env]
  DATA_DIR = '/data'
  HF_HOME = '/data/hf_cache'
  HF_HUB_OFFLINE = '0'

[[mounts]]
  source = 'chatbot_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
